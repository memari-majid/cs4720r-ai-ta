on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Sync knowledge base from Canvas
        env:
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
        run: python sync_knowledge.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet knowledge_condensed.txt && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated knowledge base
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge_condensed.txt
          git commit -m "Auto-sync AI TA knowledge base from Canvas [$(date +%Y-%m-%d)]"
          git push
